<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>SolvitSoft IA</title><link rel="stylesheet" href="style.css"></head><body><header><span class="logo">S</span><div><strong>SolvitSoft IA</strong><small>Assistente do navegador</small></div></header><section id="login"><h2>Entrar</h2><input id="email" type="email" placeholder="E-mail"><input id="password" type="password" placeholder="Senha"><button id="loginButton">Entrar na SolvitSoft</button><p id="loginError" class="error"></p></section><main id="app" hidden><div class="context"><label><input id="pageContext" type="checkbox" checked> Usar texto da página</label><label><input id="screenshot" type="checkbox"> Usar captura visível</label></div><textarea id="prompt" placeholder="O que deseja fazer com esta página?"></textarea><button id="send">Perguntar</button><div id="status"></div><article id="answer"></article><button id="insert" class="secondary">Inserir resposta no campo selecionado</button><button id="copy" class="secondary">Copiar resposta</button><button id="logout" class="secondary">Sair</button></main><script src="sidepanel.js"></script></body></html>
